<!doctype html>
<html lang="en" data-theme="dark" class="theme-dark">
  <head>
    <meta charset="utf-8" />
    <title>DEVORA | Premium Software Engineering Studio</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="DEVORA is a high-end software engineering studio specializing in enterprise AI, scalable SaaS platforms, and immersive UI/UX systems."
    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=devora-2" />
    <link rel="alternate icon" type="image/x-icon" href="favicon.ico?v=devora-2" />
    <script>
      (() => {
        let theme = 'dark';
        try {
          theme = localStorage.getItem('devora-theme') === 'light' ? 'light' : 'dark';
        } catch {
          theme = 'dark';
        }
        document.documentElement.dataset.theme = theme;
        document.documentElement.classList.toggle('theme-light', theme === 'light');
        document.documentElement.classList.toggle('theme-dark', theme === 'dark');
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
