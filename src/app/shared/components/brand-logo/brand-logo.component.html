<span class="brand-logo" [class.compact]="compact">
  <svg class="logo-mark" viewBox="0 0 64 64" role="img" aria-label="DEVORA logo">
    <defs>
      <linearGradient id="devoraLogoGradient" x1="6" x2="58" y1="8" y2="58">
        <stop offset="0" stop-color="var(--accent-cyan)" />
        <stop offset="0.5" stop-color="var(--accent-blue)" />
        <stop offset="1" stop-color="var(--accent-rose)" />
      </linearGradient>
    </defs>
    <path class="logo-frame" d="M16 8h18c13 0 22 9 22 24s-9 24-22 24H16V8Z" />
    <path class="logo-core" d="M25 19h9c7 0 12 5 12 13s-5 13-12 13h-9V19Z" />
    <path class="logo-circuit" d="M12 18h13M12 46h13M39 15l9-7M39 49l9 7" />
    <circle class="logo-node node-a" cx="12" cy="18" r="3" />
    <circle class="logo-node node-b" cx="12" cy="46" r="3" />
    <circle class="logo-node node-c" cx="50" cy="6" r="3" />
    <circle class="logo-node node-d" cx="50" cy="58" r="3" />
  </svg>

  <span class="logo-word" *ngIf="!compact">{{ label }}</span>
</span>
