@if (scrollService.isPastViewport()) {
  <button
    class="back-to-top"
    type="button"
    aria-label="Back to top"
    title="Back to top"
    (click)="scrollToTop()"
  >
    <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 19V5"></path>
      <path d="m5 12 7-7 7 7"></path>
    </svg>
  </button>
}
