<nav class="navbar fixed-top" [class.compact]="isHeaderCompact" [class.menu-open]="isMenuOpen">
  <div class="container navbar-shell p-2">
    <a
      class="navbar-brand"
      [class.active]="activeSection === 'top'"
      [href]="scrollService.getHomeSectionUrl('top')"
      [attr.aria-label]="i18n.t('nav.home')"
      (click)="navigateToSection($event, 'top')"
    >
      <app-brand-logo></app-brand-logo>
    </a>

    <button
      class="nav-toggle"
      type="button"
      aria-controls="mainNavigation"
      [attr.aria-expanded]="isMenuOpen"
      (click)="toggleMenu()"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div id="mainNavigation" class="nav-panel" [class.open]="isMenuOpen">
      <ul class="nav-list">
        @for (item of navItems; track item.fragment) {
          <li class="nav-item">
            <a
              class="nav-link"
              [class.active]="activeSection === item.fragment"
              [attr.aria-current]="activeSection === item.fragment ? 'page' : null"
              [href]="scrollService.getHomeSectionUrl(item.fragment)"
              (click)="navigateToSection($event, item.fragment)"
            >
              {{ i18n.t(item.labelKey) }}
            </a>
          </li>
        }
      </ul>

      <div class="nav-actions">
        <a
          class="dashboard-link"
          [routerLink]="authService.isAuthenticated() ? ['/dashboard'] : ['/login']"
          [attr.aria-label]="
            authService.isAuthenticated() ? i18n.t('nav.openDashboard') : i18n.t('nav.login')
          "
          [attr.title]="
            authService.isAuthenticated() ? i18n.t('nav.openDashboard') : i18n.t('nav.login')
          "
        >
          {{ authService.isAuthenticated() ? i18n.t('nav.dashboard') : i18n.t('nav.login') }}
        </a>

        <div class="theme-menu-container">
          <button class="theme-toggle-btn" type="button" aria-label="Theme">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zM12 10.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3zm-3 4.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3zm6 0a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/></svg>
          </button>
          <div class="theme-popover">
            <div class="theme-picker-group" role="radiogroup" [attr.aria-label]="i18n.t('nav.theme')">
              @for (option of themeService.themeOptions; track option.value) {
                <label class="theme-option" [class.active]="themeService.theme() === option.value" [attr.title]="option.label">
                  <input type="radio"
                         name="theme-choice"
                         class="visually-hidden"
                         [value]="option.value"
                         [checked]="themeService.theme() === option.value"
                         (change)="onThemeChange($event)">
                  <span class="radio-circle"></span>
                  <div class="theme-mockup" [ngClass]="option.value">
                    <div class="mockup-header"></div>
                    <div class="mockup-body">
                      <div class="mockup-sidebar"></div>
                    </div>
                  </div>
                </label>
              }
            </div>
          </div>
        </div>

        <button
          class="language-button"
          type="button"
          [attr.aria-label]="i18n.t('nav.language')"
          [attr.title]="i18n.t('nav.language')"
          (click)="i18n.toggleLanguage()"
        >
          {{ i18n.language() === 'en' ? 'AR' : 'EN' }}
        </button>

        <a
          class="contact-link"
          [class.active]="activeSection === 'contact'"
          [attr.aria-current]="activeSection === 'contact' ? 'page' : null"
          [href]="scrollService.getHomeSectionUrl('contact')"
          (click)="navigateToSection($event, 'contact')"
        >
          {{ i18n.t('nav.contact') }}
        </a>
      </div>
    </div>
  </div>
</nav>
