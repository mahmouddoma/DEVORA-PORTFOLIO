<main class="login-shell">
  <a class="login-brand" href="/" aria-label="DEVORA home">
    <app-brand-logo></app-brand-logo>
  </a>

  <section class="login-card" aria-labelledby="loginTitle">
    <span class="login-kicker">Dashboard Access</span>
    <h1 id="loginTitle">Login with email OTP</h1>
    <p>
      Enter your email, confirm the one-time code, then continue to the DEVORA dashboard.
    </p>

    <form *ngIf="step === 'email'; else otpStep" class="login-form" (ngSubmit)="requestOtp()">
      <label>
        <span>Email address</span>
        <input
          type="email"
          name="email"
          autocomplete="email"
          placeholder="admin@devora.studio"
          required
          [(ngModel)]="email"
        />
      </label>

      <button type="submit">Send OTP</button>
    </form>

    <ng-template #otpStep>
      <form class="login-form" (ngSubmit)="verifyOtp()">
        <label>
          <span>Email address</span>
          <input type="email" name="email" autocomplete="email" required [(ngModel)]="email" />
        </label>

        <label>
          <span>OTP code</span>
          <input
            type="text"
            name="otp"
            inputmode="numeric"
            autocomplete="one-time-code"
            maxlength="6"
            placeholder="000000"
            required
            [(ngModel)]="otp"
          />
        </label>

        <div class="dev-otp" *ngIf="authService.lastDevOtp()">
          <span>Development OTP</span>
          <strong>{{ authService.lastDevOtp() }}</strong>
        </div>

        <button type="submit">Verify and open dashboard</button>
        <button class="ghost-button" type="button" (click)="useAnotherEmail()">Use another email</button>
      </form>
    </ng-template>

    <p class="login-status" *ngIf="status">{{ status }}</p>
    <p class="login-error" *ngIf="error">{{ error }}</p>
  </section>
</main>
