<section class="testimonials-section section-padding">
  <div class="container">
    <div class="section-heading text-center">
      <span class="section-kicker motion-item">{{ i18n.t('testimonials.kicker') }}</span>
      <h2 class="section-title motion-item">{{ i18n.t('testimonials.title') }}</h2>
    </div>

    <div class="testimonial-shell motion-item">
      <article
        class="testimonial-card glass"
        *ngFor="let testimonial of testimonials; let i = index"
        [class.active]="i === activeIndex"
      >
        <div class="quote-mark">“</div>
        <p>{{ i18n.t(testimonial.contentKey) }}</p>

        <div class="testimonial-author">
          <span class="author-mark">{{ i + 1 }}</span>
          <div>
            <h3>{{ i18n.t(testimonial.nameKey) }}</h3>
            <span>
              {{ i18n.t(testimonial.roleKey) }} · {{ i18n.t(testimonial.companyKey) }}
            </span>
          </div>
        </div>
      </article>

      <div class="testimonial-controls">
        <button
          class="icon-button"
          type="button"
          [attr.aria-label]="i18n.t('testimonials.previous')"
          (click)="prev()"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M19 12H5"></path>
            <path d="m12 19-7-7 7-7"></path>
          </svg>
        </button>

        <button
          class="icon-button"
          type="button"
          [attr.aria-label]="i18n.t('testimonials.next')"
          (click)="next()"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M5 12h14"></path>
            <path d="m12 5 7 7-7 7"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>
</section>
