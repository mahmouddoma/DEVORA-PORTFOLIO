<section id="stack" class="tech-section section-padding">
  <div class="container tech-header">
    <div>
      <span class="section-kicker motion-item" data-edit-key="tech.kicker">{{ i18n.t('tech.kicker') }}</span>
      <h2 class="section-title motion-item" data-edit-key="tech.title">{{ i18n.t('tech.title') }}</h2>
    </div>
    <p class="section-copy motion-item" data-edit-key="tech.caption">{{ i18n.t('tech.caption') }}</p>
  </div>

  <div class="stack-board glass motion-item">
    <div class="board-scan"></div>
    <div class="board-cell" *ngFor="let cell of boardCellKeys">
      <app-icon name="spark"></app-icon>
      <span>{{ i18n.t(cell) }}</span>
    </div>
  </div>

  <div class="tech-marquee">
    <div class="marquee-track primary">
      <div
        class="marquee-set"
        *ngFor="let copy of marqueeCopies"
        [attr.aria-hidden]="copy === 1 ? 'true' : null"
      >
        <span class="tech-chip glass" *ngFor="let tech of technologyKeys">
          <app-icon name="code"></app-icon>
          {{ i18n.t(tech) }}
        </span>
      </div>
    </div>
  </div>

  <div class="tech-marquee">
    <div class="marquee-track secondary">
      <div
        class="marquee-set"
        *ngFor="let copy of marqueeCopies"
        [attr.aria-hidden]="copy === 1 ? 'true' : null"
      >
        <span class="tech-chip glass" *ngFor="let tech of capabilityKeys">
          <app-icon name="layers"></app-icon>
          {{ i18n.t(tech) }}
        </span>
      </div>
    </div>
  </div>
</section>
