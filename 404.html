    <title>DEVORA | Premium Software Engineering Studio</title>
    <base href="/DEVORA-PORTFOLIO/">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="DEVORA is a high-end software engineering studio specializing in enterprise AI, scalable SaaS platforms, and immersive UI/UX systems.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=devora-2">
    <link rel="alternate icon" type="image/x-icon" href="favicon.ico?v=devora-2">
    <script>
      (() => {
        const themes = ['dark', 'light', 'soft-lavender', 'violet-pulse'];
        const paletteThemes = ['soft-lavender', 'violet-pulse'];
        let theme = 'dark';
        try {
          const storedTheme = localStorage.getItem('devora-theme');
          const normalizedTheme = storedTheme === 'neon-violet' ? 'violet-pulse' : storedTheme;
          theme = themes.includes(normalizedTheme) ? normalizedTheme : 'dark';
        } catch {
          theme = 'dark';
        }
        document.documentElement.dataset.theme = theme;
        themes.forEach((item) => {
          document.documentElement.classList.toggle(`theme-${item}`, item === theme);
        });
        document.documentElement.classList.toggle('theme-palette', paletteThemes.includes(theme));
      })();
    </script>
